; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
build_cache_dir = .pio/cache
default_envs = 
    esp32_bambu_display

[env:esp32_bambu_display]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
build_src_filter = +<bambu_display.cpp>
build_unflags = -DCONFIG_IDF_TARGET_ESP32
build_flags = 
	-I include/fonts
	-I include/icons
	-DFIRMWARE_VERSION=\"1.0.1\"
	-DCONFIG_IDF_TARGET_ESP32C6=1
	-D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
	-D USER_SETUP_LOADED=1
    -D USER_SETUP_ID=46
    -D GC9A01_DRIVER=1
    -D TFT_MISO=6
    -D TFT_MOSI=5
    -D TFT_SCLK=7
    -D TFT_CS=4
    -D TFT_DC=3
    -D TFT_RST=2
    -D PIN_BACKLIGHT=1
    -D PIN_BATTERY=-1
    -D BATTERY_DIVIDER_TOP=1300
    -D BATTERY_DIVIDER_BOTTOM=300
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
lib_deps = 
	thomasfredericks/Bounce2@^2.72
lib_compat_mode = strict
